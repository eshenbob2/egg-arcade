<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Wireframe Layout</title>
  
  <style>
    /* Reset and Base Styles */
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background-color: #ffffff;
      padding: 20px;
    }

    /* Header Navbar */
    .top-nav {
      width: 100%;
      height: 50px;
      border: 2px solid #000000;
      position: relative;
      margin-bottom: 25px;
    }

    /* Styled Text Box Input */
    .search-input {
      width: 30%;
      height: 25px;
      border: 1px solid #000000;
      position: absolute;
      right: 15px;
      top: 50%;
      transform: translateY(-50%);
      padding: 0 10px; /* Adds space for internal typing text */
      outline: none;  /* Removes browser default focus outlines */
      font-family: sans-serif;
    }

    /* 3-Column Content Grid */
    .grid-container {
      display: flex;
      flex-wrap: wrap;
      gap: 20px;
      width: 100%;
    }

    /* Grid Cards */
 /* Split the card vertically: 75% thumbnail area, 25% text area */
.card {
  display: flex;
  flex-direction: column;
  overflow: hidden; /* Prevents inner content from spilling over borders */
}

/* Simulated Game Thumbnail Area */
.card-thumb {
  flex: 3;
  background-color: #f0f0f0;
  border-bottom: 1px solid #000000;
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: sans-serif;
  font-size: 14px;
  color: #777777;
}

/* Info container for text details */
.card-info {
  flex: 1;
  padding: 5px 10px;
  display: flex;
  flex-direction: column;
  justify-content: center;
  font-family: sans-serif;
}

.game-title {
  font-weight: bold;
  font-size: 14px;
  color: #000000;
}

.game-creator {
  font-size: 11px;
  color: #666666;
}


    .card:hover {
      border: 3px dotted black;
    }
  </style>
</head>
<body>

  <!-- Top Navigation Wireframe -->
  <header class="top-nav">
    <!-- Replaced div with an actual semantic text input -->
    <input type="text" class="search-input" placeholder="search...">
  </header>

  <!-- 12-Box Grid Wireframe -->
  <main class="grid-container">
    <div class="card"></div>
    <div class="card"></div>
    <div class="card"></div>
    <div class="card"></div>
    <div class="card"></div>
    <div class="card"></div>
    <div class="card"></div>
    <div class="card"></div>
    <div class="card"></div>
    <div class="card"></div>
    <div class="card"></div>
    <div class="card"></div>
  </main> 

  <script>
    document.addEventListener("DOMContentLoaded", () => {
      const cards = document.querySelectorAll(".card");
      
      cards.forEach((card, index) => {
        // Optional JS interactivity hook
        card.addEventListener("click", () => {
          console.log(`Box ${index + 1} clicked`);
        });
      });
    });
  </script>

</body>
</html>
