<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>egg arcade :D</title>

<style>
body {
  background-color: white;
  color: black;
  font-family: Arial, Helvetica, sans-serif;
  padding: 20px;
}

/* 🧱 NEW GRID CONTAINER PIPELINE (Replaced Flex with Grid) */
.grid-container {
  display: grid;
  /* Automatically fits 3 columns evenly across wide screens, stacks nicely on mobile */
  grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
  gap: 20px;
  width: 100%;
}

.card {
  background-color: white;
  border: 2px solid black;
  /* Fixed bounds so EVERY box is always identical regardless of row position */
  height: 150px;
  padding: 15px;
  cursor: pointer;
  display: flex;
  flex-direction: column;
  justify-content: space-between;
}

.card:hover {
  border: 3px solid black; 
}

.card h3 {
  font-size: 18px;
  margin-bottom: 5px;
}
.card p {
  font-size: 13px;
  color: #555;
}

.playbutton {
  border: 1px solid black;
  background-color: rgb(255, 230, 0);
  padding: 6px 12px;
  cursor: pointer;
  font-weight: bold;
  align-self: flex-start;
}

.playbutton:hover {
  border: 2px solid black; 
  background-color: rgb(200, 200, 200);
}

.topbar {
  border: none;
  background-color: white;
  color: black;
  width: 100%;
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding-bottom: 20px;
  margin-bottom: 20px;
  border-bottom: 1px solid #ccc;
}

.search {
  border: 1px solid black; 
  color: black;
  background-color: white;
  padding: 8px 12px;
  width: 30%;
  outline: none;
}

/* 🔑 ACCOUNT PANEL LAYOUT CORES */
.nav-actions {
  display: flex;
  align-items: center;
  gap: 15px;
  width: 50%;
  justify-content: flex-end;
}

.account-btn {
  background: white;
  border: 1px solid black;
  padding: 8px 12px;
  cursor: pointer;
  font-weight: bold;
}

.account-btn:hover {
  border: 2px solid black;
  background-color: #eee;
}

.account-form input {
  width: 100%;
  padding: 10px;
  margin: 8px 0;
  border: 1px solid black;
  outline: none;
  font-family: sans-serif;
}

.account-form input:focus {
  border: 2px solid black;
}
</style>
</head>
<body>

  <!-- Top Navigation View Panel -->
  <header class="topbar">
    <h1 style="font-style: italic; cursor: pointer;" onclick="window.location.reload()">egg arcade™</h1>
    
    <!-- Grouped the search box and log in button together inside your flex rules -->
    <div class="nav-actions">
      <input type="text" class="search" placeholder="Search games or creators..." style="width: 60%;">
      <button class="account-btn" id="loginNavBtn">LOG IN</button>
    </div>
  </header>

  <!-- Hardcoded Anti-Spam Protected Live Grid Elements -->
  <main class="grid-container" id="liveGameGrid">
    
    <!-- Game Card 1 (Featured) -->
    <div class="card" data-featured="true">
      <div>
        <h3>test</h3>
        <p>By: burgreez</p>
      </div>
      <button class="playbutton">PLAY</button>
    </div>
  </main> 

  <!-- Centered Play Modal Layer Overlay -->
  <div class="modal-overlay" id="gameModal">
    <div class="modal-content">
      <h2 id="modalTitle">Game Title</h2>
      <p id="modalCreator" style="color: #555; margin-top: 5px;">By: Creator</p>
      <div class="game-screen">
        <h4>[ Engine Player Loading Blueprint Canvas ]</h4>
      </div>
      <button class="playbutton" id="closeBtn">CLOSE GAME</button>
    </div>
  </div>

  <!-- 🔑 NEW LOGIN SYSTEM OVERLAY MODAL -->
  <div class="modal-overlay" id="accountModal">
    <div class="modal-content" style="max-width: 400px;">
      <h2 style="margin-bottom: 10px; font-style: italic;">egg arcade account</h2>
      <p style="font-size: 13px; color: #555; margin-bottom: 15px;">Log in to track your level submissions and stats!</p>
      
      <form class="account-form" onsubmit="event.preventDefault(); triggerMockLogin();">
        <input type="text" id="usernameField" placeholder="Choose Username..." required maxlength="15">
        <input type="password" placeholder="Password..." required>
        <button type="submit" class="playbutton" style="width: 100%; margin-top: 10px; text-align: center;">SIGN IN / SIGN UP</button>
      </form>
      
      <button class="account-btn" id="closeAccountBtn" style="margin-top: 12px; width: 100%;">CANCEL</button>
    </div>
  </div>

  <!-- Operational Search, Modal, & Interactivity Controller Scripts -->
  <script>
    document.addEventListener("DOMContentLoaded", () => {
      const cards = document.querySelectorAll(".card");
      const searchInput = document.querySelector(".search");
      
      // Game Display Elements
      const gameModal = document.getElementById("gameModal");
      const modalTitle = document.getElementById("modalTitle");
      const modalCreator = document.getElementById("modalCreator");
      const closeBtn = document.getElementById("closeBtn");

      // Account Display Elements
      const accountModal = document.getElementById("accountModal");
      const loginNavBtn = document.getElementById("loginNavBtn");
      const closeAccountBtn = document.getElementById("closeAccountBtn");

      // --- ACCOUNT BUTTON INTERACTION HANDLERS ---
      loginNavBtn.addEventListener("click", () => {
        accountModal.style.display = "flex";
      });

      closeAccountBtn.addEventListener("click", () => {
        accountModal.style.display = "none";
      });

      // Simulation showing name transformation in navbar without live servers
      window.triggerMockLogin = function() {
        const user = document.getElementById("usernameField").value.trim();
        if (user) {
          loginNavBtn.innerText = "👤 " + user.toUpperCase();
          accountModal.style.display = "none";
        }
      }

      // --- GAME CLICK WINDOW HANDLERS ---
      cards.forEach(card => {
        card.addEventListener("click", () => {
          const gameTitle = card.querySelector("h3").innerText;
          const gameCreator = card.querySelector("p").innerText;
          
          modalTitle.innerText = gameTitle;
          modalCreator.innerText = "Created using Studio " + gameCreator;
          gameModal.style.display = "flex";
        });
      });

      // --- NAV SEARCH FILTRATION HANDLERS ---
      searchInput.addEventListener("keyup", (event) => {
        const query = event.target.value.trim().toLowerCase();

        cards.forEach(card => {
          const gameTitle = card.querySelector("h3").innerText.toLowerCase();
          const gameCreator = card.querySelector("p").innerText.toLowerCase();
          const isFeatured = card.getAttribute("data-featured") === "true";

          if (query.length > 2) {
            if (gameTitle.includes(query) || gameCreator.includes(query)) {
              card.style.display = "flex";
            } else {
              card.style.display = "none";
            }
          } else if (query.length === 0) {
            if (isFeatured) {
              card.style.display = "flex";
            } else {
              card.style.display = "none";
            }
          }
        });
      });

      closeBtn.addEventListener("click", () => {
        gameModal.style.display = "none";
      });
    });
  </script>

</body>
</html>
