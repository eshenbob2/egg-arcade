<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Egg Arcade</title>
  
  <style>
    /* Reset and Base Styles */
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background-color: #232323; /* Dark theme to pop out the yellow branding text */
      color: #ffffff;
      padding: 20px;
      font-family: 'Arial Black', sans-serif;
    }

    /* Header Navbar Layout */
    .top-nav {
      width: 100%;
      height: 70px;
      border-bottom: 3px solid #ffcc00; /* Signature Egg Yellow Accent Line */
      position: relative;
      margin-bottom: 25px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 10px;
    }

    /* Brand Logo Text Styles */
    .brand-title {
      font-style: italic;
      font-size: 28px;
      user-select: none;
    }
    .brand-title span {
      color: #ffcc00; /* 'egg' highlighted in yellow */
      margin-right: 5px;
    }

    /* Styled Text Box Input (Gateway to Database Search) */
    .search-input {
      width: 30%;
      height: 35px;
      border: 2px solid #ffffff;
      background: #222222;
      color: #ffffff;
      padding: 0 15px; 
      outline: none;  
      border-radius: 4px;
      font-family: sans-serif;
    }
    .search-input:focus {
      border-color: #ffcc00; /* Flashes yellow when interacting/typing */
    }

    /* 3-Column Content Grid Layout */
    .grid-container {
      display: flex;
      flex-wrap: wrap;
      gap: 20px;
      width: 100%;
    }

    /* Interactive Grid Cards */
    .card {
      flex: 1 1 calc(33.333% - 14px); /* Creates 3 columns accounting for gap sizes */
      min-width: 250px; /* Forces layout items to stack cleanly on small mobile viewports */
      height: 180px;
      border: 2px solid #333333;
      background: #1a1a1a;
      cursor: pointer;
      border-radius: 8px;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
      padding: 15px;
      position: relative;
      transition: transform 0.1s ease;
    }

    /* Visual Content Box Simulator Component */
    .card::before {
      position: absolute;
      top: 35%;
      left: 50%;
      transform: translate(-50%, -50%);
      font-size: 40px;
      opacity: 0.2;
    }

    .card h3 {
      font-size: 16px;
      color: #ffcc00;
      z-index: 2;
    }
    .card p {
      font-size: 11px;
      color: #aaaaaa;
      font-family: sans-serif;
      z-index: 2;
      margin-top: 4px;
    }

    .card:hover {
      border: 2px solid #ffcc00;
    }

    /* Game Play Popup Modal Overlay Layer */
    .modal-overlay {
      display: none; /* Controlled dynamically by JavaScript logic */
      position: fixed;
      top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(0, 0, 0, 0.9);
      z-index: 10;
      justify-content: center;
      align-items: center;
    }
    .modal-content {
      background: #222222;
      border: 3px solid #ffcc00;
      padding: 30px;
      border-radius: 12px;
      text-align: center;
      width: 90%;
      max-width: 700px;
    }
    .game-screen {
      width: 100%;
      height: 380px;
      background: #000000;
      border: 2px solid #444444;
      margin: 15px 0;
      display: flex;
      justify-content: center;
      align-items: center;
      color: #555555;
    }
    .close-btn {
      background: #ffcc00;
      color: #000000;
      border: none;
      padding: 8px 16px;
      font-family: 'Arial Black', sans-serif;
      cursor: pointer;
      border-radius: 4px;
      transition: background 0.2s;
    }
    .close-btn:hover {
      background: #ffffff;
    }
  </style>
</head>
<body>

  <!-- Top Navigation View Layer -->
  <header class="top-nav">
    <div class="brand-title"><span>egg</span>arcade<sup>™</sup></div>
    <input type="text" class="search-input" placeholder="search games or creators...">
  </header>

  <!-- Dynamic Content Layout Engine Container -->
  <main class="grid-container" id="liveGameGrid">
    <!-- Web elements are completely empty by default. JavaScript engine loads items live here -->
  </main> 

  <!-- Game Play Overlay Workspace Modals -->
  <div class="modal-overlay" id="gameModal">
    <div class="modal-content">
      <h2 id="modalTitle">Game Title</h2>
      <p id="modalCreator" style="font-family: sans-serif; font-size: 13px; color: #aaaaaa; margin-top: 4px;">By: Creator</p>
      <div class="game-screen">
        <h3>[ Web Game Engine Loading Canvas ]</h3>
      </div>
      <button class="close-btn" id="closeBtn">CLOSE GAME</button>
    </div>
  </div>

  <!-- Central Functional Architecture Script Panel -->
  <script>
    document.addEventListener("DOMContentLoaded", () => {
      const gridContainer = document.getElementById("liveGameGrid");
      const searchInput = document.querySelector(".search-input");
      const modal = document.getElementById("gameModal");
      const modalTitle = document.getElementById("modalTitle");
      const modalCreator = document.getElementById("modalCreator");
      const closeBtn = document.getElementById("closeBtn");

      // 1. Core State Target Base URL Routes (Update this once your laptop environment is active)
      const BASE_API_URL = "https://eggarcade.com";

      // 2. Initial Execution: Pull ONLY featured/curated records to bypass homepage spam loops
      loadGames(`${BASE_API_URL}/featured`);

      // 3. Filter Actions: Intercept keystroke patterns on the main navigation panel
      searchInput.addEventListener("keyup", (event) => {
        const query = event.target.value.trim();

        if (query.length > 2) {
          // Drops featured grid instantly to query the deep index for title/creator matches
          loadGames(`${BASE_API_URL}/search?q=${encodeURIComponent(query)}`);
        } else if (query.length === 0) {
          // Reverts instantly to clean curated content state if space is cleared
          loadGames(`${BASE_API_URL}/featured`);
        }
      });

      // 4. Interface Rendering Pipeline Function
      function loadGames(targetUrl) {
        fetch(targetUrl)
          .then(response => response.json())
          .then(gamesList => {
            gridContainer.innerHTML = ""; // Hard clear old elements out of the workspace container

            // Safety catch parameter if database matches return blank arrays
            if (gamesList.length === 0) {
              gridContainer.innerHTML = "<p style='color: #aaaaaa; font-family: sans-serif; padding: 20px; width: 100%; text-align: center;'>No arcade levels found matching that criteria.</p>";
              return;
            }

            // Loop parameters auto-building cards without file manual markup changes
            gamesList.forEach(game => {
              const card = document.createElement("div");
              card.className = "card";
              card.innerHTML = `
                <h3>${game.level_name}</h3>
                <p>By: ${game.creator_username}</p>
              `;
              
              // Direct player initialization injection trigger hook
              card.addEventListener("click", () => {
                modalTitle.innerText = game.level_name;
                modalCreator.innerText = "Created using Studio by: " + game.creator_username;
                modal.style.display = "flex";
                
                // Instructs web canvas layer where to locate structural runtime definitions
                initWebPlayer(game.json_file_url);
              });

              gridContainer.appendChild(card);
            });
          })
          .catch(err => {
            console.error("Data tracking operations intercepted: ", err);
            gridContainer.innerHTML = "<p style='color: #ff4444; font-family: sans-serif; padding: 20px; width: 100%; text-align: center;'>Unable to link into Egg Arcade Servers.</p>";
          });
      }

      // Close button window handler routine
      closeBtn.addEventListener("click", () => {
        modal.style.display = "none";
      });
    });

    function initWebPlayer(blueprintLocationUrl) {
      console.log("Web player container target locked onto blueprint file asset maps: " + blueprintLocationUrl);
    }
  </script>

</body>
</html>
