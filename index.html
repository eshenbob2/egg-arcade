<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>egg arcade :D</title>

<style>
body {
  background-color: white;
  color: black;
  font-family: Arial, Helvetica, sans-serif;
  padding: 20px;
}

/* 🧱 NEW GRID CONTAINER PIPELINE (Replaced Flex with Grid.) */
.grid-container {
  display: grid;
  /* Automatically fits 3 columns evenly across wide screens, stacks nicely on mobile */
  grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
  gap: 20px;
  width: 100%;
}

.card {
  background-color: white;
  border: 2px solid black;
  /* Fixed bounds so EVERY box is always identical regardless of row position */
  height: 150px;
  padding: 15px;
  cursor: pointer;
  display: flex;
  flex-direction: column;
  justify-content: space-between;
}

.card:hover {
  border: 3px solid black; 
}

.card h3 {
  font-size: 18px;
  margin-bottom: 5px;
}
.card p {
  font-size: 13px;
  color: #555;
}

.playbutton {
  border: 1px solid black;
  background-color: rgb(255, 230, 0);
  padding: 6px 12px;
  cursor: pointer;
  font-weight: bold;
  align-self: flex-start;
}

.playbutton:hover {
  border: 2px solid black; 
  background-color: rgb(200, 200, 200);
}

.topbar {
  border: none;
  background-color: white;
  color: black;
  width: 100%;
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding-bottom: 20px;
  margin-bottom: 20px;
  border-bottom: 1px solid #ccc;
}

.search {
  border: 1px solid black; 
  color: black;
  background-color: white;
  padding: 8px 12px;
  width: 30%;
  outline: none;
}

/* Modal Window Layout Styles */
.modal-overlay {
  display: none; 
  position: fixed;
  top: 0; left: 0; width: 100%; height: 100%;
  background: rgba(0, 0, 0, 0.7);
  z-index: 10;
  justify-content: center;
  align-items: center;
}
.modal-content {
  background: white;
  border: 2px solid black;
  padding: 30px;
  text-align: center;
  width: 90%;
  max-width: 600px;
}
.game-screen {
  width: 100%;
  height: 300px;
  background: #eee;
  border: 1px solid black;
  margin: 15px 0;
  display: flex;
  justify-content: center;
  align-items: center;
}
</style>
</head>
<body>

  <!-- Top Navigation View Panel -->
  <header class="topbar">
    <h1 style="font-style: italic;">egg arcade™</h1>
    <input type="text" class="search" placeholder="Search games or creators...">
  </header>

  <!-- Hardcoded Anti-Spam Protected Live Grid Elements -->
  <main class="grid-container" id="liveGameGrid">
    
    <!-- Game Card 1 (Featured) - Fixed tag structure layout error here -->
    <div class="card" data-featured="true">
      <div>
        <h3>test</h3>
        <p>By: burgreez</p>
      </div>
      <button class="playbutton">PLAY</button>
    </div>
  </main> 

  <!-- Centered Play Modal Layer Overlay -->
  <div class="modal-overlay" id="gameModal">
    <div class="modal-content">
      <h2 id="modalTitle">Game Title</h2>
      <p id="modalCreator" style="color: #555; margin-top: 5px;">By: Creator</p>
      <div class="game-screen">
        <h4>[ Engine Player Loading Blueprint Canvas ]</h4>
      </div>
      <button class="playbutton" id="closeBtn">CLOSE GAME</button>
    </div>
  </div>

  <!-- Operational Search & Modal Interactivity Controller Scripts -->
  <script>
    document.addEventListener("DOMContentLoaded", () => {
      const cards = document.querySelectorAll(".card");
      const searchInput = document.querySelector(".search");
      const modal = document.getElementById("gameModal");
      const modalTitle = document.getElementById("modalTitle");
      const modalCreator = document.getElementById("modalCreator");
      const closeBtn = document.getElementById("closeBtn");

      // 1. Click Listener Action: Maps your custom layout items to your modal player
      cards.forEach(card => {
        card.addEventListener("click", () => {
          const gameTitle = card.querySelector("h3").innerText;
          const gameCreator = card.querySelector("p").innerText;
          
          modalTitle.innerText = gameTitle;
          modalCreator.innerText = "Created using Studio " + gameCreator;
          modal.style.display = "flex";
        });
      });

      // 2. Search Box Keystroke Interceptor Filter
      searchInput.addEventListener("keyup", (event) => {
        const query = event.target.value.trim().toLowerCase();

        cards.forEach(card => {
          const gameTitle = card.querySelector("h3").innerText.toLowerCase();
          const gameCreator = card.querySelector("p").innerText.toLowerCase();
          const isFeatured = card.getAttribute("data-featured") === "true";

          if (query.length > 2) {
            // Typing more than 2 characters searches EVERYTHING across the grid layout
            if (gameTitle.includes(query) || gameCreator.includes(query)) {
              card.style.display = "flex";
            } else {
              card.style.display = "none";
            }
          } else if (query.length === 0) {
            // Clearing the search bar filters back to Premium Featured items automatically
            if (isFeatured) {
              card.style.display = "flex";
            } else {
              card.style.display = "none";
            }
          }
        });
      });

      // Close handler routines
      closeBtn.addEventListener("click", () => {
        modal.style.display = "none";
      });
    });
  </script>

</body>
</html>
