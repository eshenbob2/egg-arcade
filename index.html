<!DOCTYPE html>
<html lang="en">
<head>
  <style>
    body {
      font-family: Arial, Helvetica, sans-serif;
      color: black;

    /* Fixed: Changed 'frame' to '.frame' and fixed the colon */

      border: 2px solid black;

    <p>This content is now sitting inside your styled frame!</p>
  </div>
