<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Game Creation Platform</title>
  
  <style>
    /* Reset and Base Styles */
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background-color: #ffffff;
      padding: 20px;
    }

    /* Header Navbar */
    .top-nav {
      width: 100%;
      height: 50px;
      border: 2px solid #000000;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 15px;
      margin-bottom: 25px;
    }

    /* Create Button Styling */
    .create-btn {
      height: 30px;
      padding: 0 15px;
      border: 2px solid #000000;
      background-color: #ffffff;
      font-weight: bold;
      cursor: pointer;
      font-family: sans-serif;
    }

    .create-btn:hover {
      background-color: #000000;
      color: #ffffff;
    }

    /* Styled Text Box Input */
    .search-input {
      width: 30%;
      height: 25px;
      border: 1px solid #000000;
      padding: 0 10px;
      outline: none;
      font-family: sans-serif;
    }

    /* 3-Column Content Grid */
    .grid-container {
      display: flex;
      flex-wrap: wrap;
      gap: 20px;
      width: 100%;
    }

    /* Grid Cards */
    .card {
      flex: 1 1 calc(33.333% - 14px);
      min-width: 250px;
      height: 150px;
      border: 2px solid #000000;
      cursor: pointer;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .card:hover {
      border: 3px dotted black;
    }

    /* Dynamic Inner Card Styles */
    .card-thumb {
      flex: 3;
      background-color: #f0f0f0;
      border-bottom: 1px solid #000000;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: sans-serif;
      font-size: 14px;
      color: #777777;
    }

    .card-info {
      flex: 1;
      padding: 5px 10px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      font-family: sans-serif;
    }

    .game-title {
      font-weight: bold;
      font-size: 14px;
      color: #000000;
    }

    /* Message shown when no games have been created yet */
    .empty-message {
      font-family: sans-serif;
      color: #777777;
      text-align: center;
      width: 100%;
      padding: 40px;
    }
  </style>
</head>
<body>

  <!-- Top Navigation Wireframe -->
  <header class="top-nav">
    <button class="create-btn" id="createBtn">+ Create Game</button>
    <input type="text" class="search-input" id="searchBar" placeholder="search...">
  </header>

  <!-- Container for User Created Games -->
  <main class="grid-container" id="gameGrid"></main> 

  <script>
    // 1. Initialize user database from LocalStorage (persists data across page refreshes)
    let userGames = JSON.parse(localStorage.getItem('myCreatedGames')) || [];

    // 2. Render created games onto dashboard
    function renderGames(gamesList) {
      const grid = document.getElementById("gameGrid");
      grid.innerHTML = ""; 

      if (gamesList.length === 0) {
        grid.innerHTML = `<div class="empty-message">No games found. Click "+ Create Game" to build your first project!</div>`;
        return;
      }

      gamesList.forEach((game) => {
        const card = document.createElement("div");
        card.className = "card";

        const thumb = document.createElement("div");
        thumb.className = "card-thumb";
        thumb.textContent = "Play Game";

        const info = document.createElement("div");
        info.className = "card-info";

        const title = document.createElement("div");
        title.className = "game-title";
        title.textContent = game.title;

        info.appendChild(title);
        card.appendChild(thumb);
        card.appendChild(info);

        // Core Launch Trigger
        card.addEventListener("click", () => {
          alert(`Loading engine player to run your project: "${game.title}"`);
          // This is where your code player script will execute the project logic
        });

        grid.appendChild(card);
      });
    }

    // 3. Setup event listeners on startup
    document.addEventListener("DOMContentLoaded", () => {
      renderGames(userGames);

      // Handle Game Creation Prompt
      const createBtn = document.getElementById("createBtn");
      createBtn.addEventListener("click", () => {
        const titleInput = prompt("Enter a name for your new game:");
        
        // Ensure they typed something and didn't hit cancel
        if (titleInput && titleInput.trim() !== "") {
          const newGame = {
            id: Date.now(), // Unique ID using timestamp
            title: titleInput.trim()
          };

          // Update local memory data arrays
          userGames.push(newGame);
          localStorage.setItem('myCreatedGames', JSON.stringify(userGames));
          
          // Re-render dashboard to show the new card
          renderGames(userGames);
        }
      });

      // Filter your created games through searching
      const searchBar = document.getElementById("searchBar");
      searchBar.addEventListener("input", (e) => {
        const searchTerm = e.target.value.toLowerCase();
        const filteredGames = userGames.filter(game => 
          game.title.toLowerCase().includes(searchTerm)
        );
        renderGames(filteredGames);
      });
    });
  </script>

</body>
</html>
