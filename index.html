<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>egg arcade :D</title>

<style>
body {
  background-color: white;
  color: black;
  font-family: Arial, Helvetica, sans-serif;
  padding: 20px;
}

/* 🧱 GRID CONTAINER PIPELINE */
.grid-container {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
  gap: 20px;
  width: 100%;
}

.card {
  background-color: white;
  border: 2px solid black;
  height: 150px;
  padding: 15px;
  cursor: pointer;
  display: flex;
  flex-direction: column;
  justify-content: space-between;
}

.card:hover {
  border: 3px solid black; 
}

.card h3 {
  font-size: 18px;
  margin-bottom: 5px;
}
.card p {
  font-size: 13px;
  color: #555;
}

.playbutton {
  border: 1px solid black;
  background-color: rgb(255, 230, 0);
  padding: 6px 12px;
  cursor: pointer;
  font-weight: bold;
  align-self: flex-start;
}

.playbutton:hover {
  border: 2px solid black; 
  background-color: rgb(200, 200, 200);
}

.topbar {
  border: none;
  background-color: white;
  color: black;
  width: 100%;
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding-bottom: 20px;
  margin-bottom: 20px;
  border-bottom: 1px solid #ccc;
}

.search {
  border: 1px solid black; 
  color: black;
  background-color: white;
  padding: 8px 12px;
  width: 30%;
  outline: none;
}

/* Minimal Account Buttons matching your standard button styles */
.nav-actions {
  display: flex;
  align-items: center;
  gap: 15px;
  width: 50%;
  justify-content: flex-end;
}

.account-btn {
  background: white;
  border: 1px solid black;
  padding: 8px 12px;
  cursor: pointer;
  font-weight: bold;
}
.account-btn:hover {
  border: 2px solid black;
  background-color: #eee;
}

/* Simple overlay system for account forms */
.modal-overlay {
  display: none; 
  position: fixed;
  top: 0; left: 0; width: 100%; height: 100%;
  background: rgba(0, 0, 0, 0.7);
  z-index: 10;
  justify-content: center;
  align-items: center;
}
.modal-content {
  background: white;
  border: 2px solid black;
  padding: 30px;
  text-align: center;
  width: 90%;
  max-width: 400px;
}
.account-form input {
  width: 100%;
  padding: 10px;
  margin: 8px 0;
  border: 1px solid black;
  outline: none;
}
</style>
</head>
<body>

  <!-- Top Navigation Panel -->
  <header class="topbar">
    <h1 style="font-style: italic;">egg arcade™</h1>
    <div class="nav-actions">
      <input type="text" class="search" placeholder="Search games or creators...">
      <button class="account-btn" id="loginNavBtn">LOG IN</button>
    </div>
  </header>

  <!-- Hardcoded Grid Elements -->
  <main class="grid-container" id="liveGameGrid">
    <div class="card" data-featured="true">
      <div>
        <h3>test</h3>
        <p>By: burgreez</p>
      </div>
      <button class="playbutton">PLAY</button>
    </div>
  </main> 

  <!-- Simple Login Panel Overlay -->
  <div class="modal-overlay" id="accountModal">
    <div class="modal-content">
      <h2 style="margin-bottom: 10px; font-style: italic;">egg arcade account</h2>
      <p style="font-size: 13px; color: #555; margin-bottom: 15px;">Log in to track your level submissions and stats!</p>
      <form onsubmit="event.preventDefault(); triggerMockLogin();">
        <input type="text" id="usernameField" placeholder="Choose Username..." required maxlength="15">
        <input type="password" placeholder="Password..." required>
        <button type="submit" class="playbutton" style="width: 100%; margin-top: 10px; text-align: center;">SIGN IN / SIGN UP</button>
      </form>
      <button class="account-btn" id="closeAccountBtn" style="margin-top: 12px; width: 100%;">CANCEL</button>
    </div>
  </div>

  <script>
    document.addEventListener("DOMContentLoaded", () => {
      const cards = document.querySelectorAll(".card");
      const searchInput = document.querySelector(".search");
      const accountModal = document.getElementById("accountModal");
      const loginNavBtn = document.getElementById("loginNavBtn");
      const closeAccountBtn = document.getElementById("closeAccountBtn");

      // 💾 Check browser storage on boot to preserve usernames automatically
      const savedUser = localStorage.getItem("eggArcadeUser");
      if (savedUser) {
        loginNavBtn.innerText = "👤 " + savedUser.toUpperCase();
      }

      // Account Button Handlers
      loginNavBtn.addEventListener("click", () => {
        if (localStorage.getItem("eggArcadeUser")) {
          if (confirm("Do you want to log out?")) {
            localStorage.removeItem("eggArcadeUser");
            loginNavBtn.innerText = "LOG IN";
          }
        } else {
          accountModal.style.display = "flex";
        }
      });

      closeAccountBtn.addEventListener("click", () => {
        accountModal.style.display = "none";
      });

      window.triggerMockLogin = function() {
        const user = document.getElementById("usernameField").value.trim();
        if (user) {
          localStorage.setItem("eggArcadeUser", user);
          loginNavBtn.innerText = "👤 " + user.toUpperCase();
          accountModal.style.display = "none";
        }
      }

      // Card Execution (Your classic engine hook)
      cards.forEach(card => {
        card.addEventListener("click", (e) => {
          // If they click the card or play button, fire up the game launch sequence
          console.log("Initializing web runner engine canvas properties...");
        });
      });

      // Filter Actions
      searchInput.addEventListener("keyup", (event) => {
        const query = event.target.value.trim().toLowerCase();
        cards.forEach(card => {
          const gameTitle = card.querySelector("h3").innerText.toLowerCase();
          const gameCreator = card.querySelector("p").innerText.toLowerCase();
          const isFeatured = card.getAttribute("data-featured") === "true";

          if (query.length > 2) {
            if (gameTitle.includes(query) || gameCreator.includes(query)) card.style.display = "flex";
            else card.style.display = "none";
          } else if (query.length === 0) {
            if (isFeatured) card.style.display = "flex";
            else card.style.display = "none";
          }
        });
      });
    });
  </script>

</body>
</html>
