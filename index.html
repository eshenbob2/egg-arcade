<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Wireframe Layout</title>
  
  <style>
    /* Reset and Base Styles */
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background-color: #ffffff;
      padding: 20px;
    }

    /* Header Navbar */
    .top-nav {
      width: 100%;
      height: 50px;
      border: 2px solid #000000;
      position: relative;
      margin-bottom: 25px;
    }

    /* Styled Text Box Input */
    .search-input {
      width: 30%;
      height: 25px;
      border: 1px solid #000000;
      position: absolute;
      right: 15px;
      top: 50%;
      transform: translateY(-50%);
      padding: 0 10px;
      outline: none;
      font-family: sans-serif;
    }

    /* 3-Column Content Grid */
    .grid-container {
      display: flex;
      flex-wrap: wrap;
      gap: 20px;
      width: 100%;
    }

    /* Grid Cards */
    .card {
      flex: 1 1 calc(33.333% - 14px);
      min-width: 250px;
      height: 150px;
      border: 2px solid #000000;
      cursor: pointer;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .card:hover {
      border: 3px dotted black;
    }

    /* Dynamic Inner Card Styles */
    .card-thumb {
      flex: 3;
      background-color: #f0f0f0;
      border-bottom: 1px solid #000000;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: sans-serif;
      font-size: 14px;
      color: #777777;
    }

    .card-info {
      flex: 1;
      padding: 5px 10px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      font-family: sans-serif;
    }

    .game-title {
      font-weight: bold;
      font-size: 14px;
      color: #000000;
    }

    .game-creator {
      font-size: 11px;
      color: #666666;
    }
  </style>
</head>
<body>

  <!-- Top Navigation Wireframe -->
  <header class="top-nav">
    <input type="text" class="search-input" id="searchBar" placeholder="search...">
  </header>

  <!-- Container left empty: JavaScript handles everything here -->
  <main class="grid-container" id="gameGrid"></main> 

  <script>
    // 1. Central Game Data Store (Simulating user-created games)
    const gamesDatabase = [
      { id: 1, title: "Speed Run Obby 🚀", creator: "User402" },
      { id: 2, title: "Base Wars PvP ⚔️", creator: "DevGamer" },
      { id: 3, title: "Clicker Tycoon 💰", creator: "PixelArtist" },
      { id: 4, title: "Hide and Seek 🙈", creator: "CodeMaster" },
      { id: 5, title: "Space Explorer 🌌", creator: "NovaBuilds" },
      { id: 6, title: "Medieval Quest 🛡️", creator: "KnightDev" },
      { id: 7, title: "City Simulator 🏙️", creator: "BuilderJoe" },
      { id: 8, title: "Zombie Survival 🧟", creator: "Survivor9" },
      { id: 9, title: "Kart Racer Extreme 🏎️", creator: "Speedy" },
      { id: 10, title: "Escape Room Mystery 🔑", creator: "Brainiac" },
      { id: 11, title: "Tower Defense 🗼", creator: "StrategyPro" },
      { id: 12, title: "Island Survival 🏝️", creator: "Crafty" }
    ];

    // 2. Function to dynamically build DOM elements
    function renderGames(gamesList) {
      const grid = document.getElementById("gameGrid");
      grid.innerHTML = ""; // Clear existing grid items

      gamesList.forEach((game) => {
        // Create base card element
        const card = document.createElement("div");
        card.className = "card";

        // Setup thumbnail node
        const thumb = document.createElement("div");
        thumb.className = "card-thumb";
        thumb.textContent = "Thumbnail";

        // Setup info node
        const info = document.createElement("div");
        info.className = "card-info";

        const title = document.createElement("div");
        title.className = "game-title";
        title.textContent = game.title;

        const creator = document.createElement("div");
        creator.className = "game-creator";
        creator.textContent = `by ${game.creator}`;

        // Stitch the nodes together
        info.appendChild(title);
        info.appendChild(creator);
        card.appendChild(thumb);
        card.appendChild(info);

        // Core Launch Logic
        card.addEventListener("click", () => {
          alert(`Launching game ID ${game.id}: "${game.title}"`);
          // This is where your game player engine script will run later!
        });

        grid.appendChild(card);
      });
    }

    // Initialize layout rendering on page load
    document.addEventListener("DOMContentLoaded", () => {
      renderGames(gamesDatabase);

      // Search filtering integration
      const searchBar = document.getElementById("searchBar");
      searchBar.addEventListener("input", (e) => {
        const searchTerm = e.target.value.toLowerCase();
        const filteredGames = gamesDatabase.filter(game => 
          game.title.toLowerCase().includes(searchTerm) || 
          game.creator.toLowerCase().includes(searchTerm)
        );
        renderGames(filteredGames);
      });
    });
  </script>


</body>
</html>
