<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>egg arcade :D</title>

<style>
body {
  background-color: white;
  color: black;
  font-family: Arial, Helvetica, sans-serif;
  padding: 20px;
}

/* 🧱 GRID CONTAINER PIPELINE */
.grid-container {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
  gap: 20px;
  width: 100%;
}

.card {
  background-color: white;
  border: 2px solid black;
  height: 150px;
  padding: 15px;
  cursor: pointer;
  display: flex;
  flex-direction: column;
  justify-content: space-between;
}

.card:hover {
  border: 3px solid black; 
}

.card h3 {
  font-size: 18px;
  margin-bottom: 5px;
}
.card p {
  font-size: 13px;
  color: #555;
}

.playbutton {
  border: 1px solid black;
  background-color: rgb(255, 230, 0);
  padding: 6px 12px;
  cursor: pointer;
  font-weight: bold;
  align-self: flex-start;
}

.playbutton:hover {
  border: 2px solid black; 
  background-color: rgb(200, 200, 200);
}

.topbar {
  border: none;
  background-color: white;
  color: black;
  width: 100%;
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding-bottom: 20px;
  margin-bottom: 20px;
  border-bottom: 1px solid #ccc;
}

.search {
  border: 1px solid black; 
  color: black;
  background-color: white;
  padding: 8px 12px;
  width: 30%;
  outline: none;
}

.nav-actions {
  display: flex;
  align-items: center;
  gap: 15px;
  width: 50%;
  justify-content: flex-end;
}

.account-btn {
  background: white;
  border: 1px solid black;
  padding: 8px 12px;
  cursor: pointer;
  font-weight: bold;
}
.account-btn:hover {
  border: 2px solid black;
  background-color: #eee;
}

/* 🖥️ CLEAN OVERLAY WINDOW SYSTEM */
.modal-overlay {
  display: none; 
  position: fixed;
  top: 0; left: 0; width: 100%; height: 100%;
  background: rgba(0, 0, 0, 0.7);
  z-index: 10;
  justify-content: center;
  align-items: center;
}
.modal-content {
  background: white;
  border: 2px solid black;
  padding: 30px;
  text-align: center;
  width: 90%;
  max-width: 500px;
}
.account-form input {
  width: 100%;
  padding: 10px;
  margin: 8px 0;
  border: 1px solid black;
  outline: none;
}

/* 🕹️ RETRO GAME CONTROLLER SCREEN */
.game-canvas-screen {
  width: 100%;
  height: 250px;
  background-color: #f0f0f0;
  border: 2px solid black;
  margin: 15px 0;
  display: flex;
  justify-content: center;
  align-items: center;
  font-weight: bold;
}
</style>
</head>
<body>

  <!-- Top Navigation Panel -->
  <header class="topbar">
    <h1 style="font-style: italic;">egg arcade™</h1>
    <div class="nav-actions">
      <input type="text" class="search" placeholder="search cool games and cool creators">
      <button class="account-btn" id="loginNavBtn">log in</button>
    </div>
  </header>

  <!-- Hardcoded Grid Elements -->
  <main class="grid-container" id="liveGameGrid">
    <div class="card" data-featured="true">
      <div>
        <h3>test</h3>
        <p>By: burgreez</p>
      </div>
      <button class="playbutton">PLAY :D</button>
    </div>
  </main> 

  <!-- 🕹️ THE LIVE GAME RETRO POPUP WINDOW -->
  <div class="modal-overlay" id="gamePlayModal">
    <div class="modal-content">
      <h2 id="modalGameTitle" style="font-style: italic;">Game Title</h2>
      <p id="modalGameCreator" style="font-size: 13px; color: #555; margin-top: 5px;">By: Creator</p>
      
      <div class="game-canvas-screen">
        loading game... (if it takes too long our servers probably broke)
      </div>
      
      <button class="playbutton" id="closeGameBtn" style="width: 100%; text-align: center;">ragequit game 🥀</button>
    </div>
  </div>

  <!-- Simple Login Panel Overlay -->
  <div class="modal-overlay" id="accountModal">
    <div class="modal-content" style="max-width: 400px;">
      <h2 style="margin-bottom: 10px; font-style: italic;">egg arcade account</h2>
      <p style="font-size: 13px; color: #555; margin-bottom: 15px;">log in to use egg arcade studio :D</p>
      <form onsubmit="event.preventDefault(); triggerMockLogin();">
        <input type="text" id="usernameField" placeholder="choose a cool username." required maxlength="15">
        <input type="password" placeholder="password" required>
        <button type="submit" class="playbutton" style="width: 100%; margin-top: 10px; text-align: center;">SIGN IN / SIGN UP</button>
      </form>
      <button class="account-btn" id="closeAccountBtn" style="margin-top: 12px; width: 100%;">CANCEL</button>
    </div>
  </div>

  <script>
    document.addEventListener("DOMContentLoaded", () => {
      const cards = document.querySelectorAll(".card");
      const searchInput = document.querySelector(".search");
      
      // Modal Selectors
      const accountModal = document.getElementById("accountModal");
      const loginNavBtn = document.getElementById("loginNavBtn");
      const closeAccountBtn = document.getElementById("closeAccountBtn");
      
      const gamePlayModal = document.getElementById("gamePlayModal");
      const modalGameTitle = document.getElementById("modalGameTitle");
      const modalGameCreator = document.getElementById("modalGameCreator");
      const closeGameBtn = document.getElementById("closeGameBtn");

      // 💾 Check browser storage on boot
      const savedUser = localStorage.getItem("eggArcadeUser");
      if (savedUser) {
        loginNavBtn.innerText = "" + savedUser.toLowerCase();
      }

      // Account Button Handlers
      loginNavBtn.addEventListener("click", () => {
        if (localStorage.getItem("eggArcadeUser")) {
          if (confirm("u really wanna log out?")) {
            localStorage.removeItem("eggArcadeUser");
            loginNavBtn.innerText = "log in plz";
          }
        } else {
          accountModal.style.display = "flex";
        }
      });

      closeAccountBtn.addEventListener("click", () => {
        accountModal.style.display = "none";
      });

      window.triggerMockLogin = function() {
        const user = document.getElementById("usernameField").value.trim();
        if (user) {
          localStorage.setItem("eggArcadeUser", user);
          loginNavBtn.innerText = "" + user.toLowerCase();
          accountModal.style.display = "none";
        }
      }

      // 🕹️ Card Click Launcher Function
      cards.forEach(card => {
        card.addEventListener("click", () => {
          const gameTitle = card.querySelector("h3").innerText;
          const gameCreator = card.querySelector("p").innerText;
          
          // Inject the card info straight into the popup screen details
          modalGameTitle.innerText = gameTitle;
          modalGameCreator.innerText = "created with the amazing egg arcade studio " + gameCreator;
          
          // Slide the play window into view
          gamePlayModal.style.display = "flex";
        });
      });

      closeGameBtn.addEventListener("click", () => {
        gamePlayModal.style.display = "none";
      });

      // Filter Actions
      searchInput.addEventListener("keyup", (event) => {
        const query = event.target.value.trim().toLowerCase();
        cards.forEach(card => {
          const gameTitle = card.querySelector("h3").innerText.toLowerCase();
          const gameCreator = card.querySelector("p").innerText.toLowerCase();
          const isFeatured = card.getAttribute("data-featured") === "true";

          if (query.length > 2) {
            if (gameTitle.includes(query) || gameCreator.includes(query)) card.style.display = "flex";
            else card.style.display = "none";
          } else if (query.length === 0) {
            if (isFeatured) card.style.display = "flex";
            else card.style.display = "none";
          }
        });
      });
    });
  </script>

</body>
</html>
