<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>egg arcade</title>
  
  <style>
    /* Reset and Base Styles */
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background-color: #ffffff;
      padding: 20px;
    }

    /* Header Navbar */
    .top-nav {
      width: 100%;
      height: 50px;
      border: 2px solid #000000;
      position: relative;
      margin-bottom: 15px; /* Reduced slightly to account for the alert banner */
      display: flex;
      align-items: center;
      padding: 0 15px;
    }

    /* Left-aligned Login/Logout System container */
    .auth-container {
      display: flex;
      align-items: center;
      gap: 10px;
      font-family: sans-serif;
    }

    .auth-input {
      height: 25px;
      width: 110px;
      border: 1px solid #000000;
      padding: 0 8px;
      font-size: 12px;
      outline: none;
    }

    .auth-btn, .signout-btn {
      height: 25px;
      padding: 0 12px;
      border: 1px solid #000000;
      background-color: #ffffff;
      font-weight: bold;
      font-size: 12px;
      cursor: pointer;
    }

    .auth-btn:hover, .signout-btn:hover {
      background-color: #000000;
      color: #ffffff;
    }

    .username-display {
      font-size: 14px;
      font-weight: bold;
    }

    /* Styled Text Box Input */
    .search-input {
      width: 30%;
      height: 25px;
      border: 1px solid #000000;
      position: absolute;
      right: 15px;
      top: 50%;
      transform: translateY(-50%);
      padding: 0 10px; /* Adds space for internal typing text */
      outline: none;  /* Removes browser default focus outlines */
      font-family: sans-serif;
    }

    /* Email Verification Alert Banner Layout */
    .verification-banner {
      width: 100%;
      background-color: #fff3cd;
      border: 2px dashed #856404;
      color: #856404;
      padding: 10px;
      margin-bottom: 25px;
      font-family: sans-serif;
      font-size: 13px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .verify-btn {
      background: none;
      border: none;
      text-decoration: underline;
      font-weight: bold;
      color: #856404;
      cursor: pointer;
    }

    /* 3-Column Content Grid */
    .grid-container {
      display: flex;
      flex-wrap: wrap;
      gap: 20px;
      width: 100%;
    }

    /* Grid Cards */
    .card {
      flex: 1 1 calc(33.333% - 14px); /* Creates 3 columns accounting for gap */
      min-width: 250px; /* Forces boxes to stack cleanly on small mobile screens */
      height: 150px;
      border: 2px solid #000000;
      cursor: pointer;
    }

    .card:hover {
      border: 3px dotted black;
    }
  </style>
</head>
<body>

  <!-- Top Navigation Wireframe -->
  <header class="top-nav">
    <!-- Dynamic Auth System Area (Injected via Javascript) -->
    <div class="auth-container" id="authBox"></div>

    <!-- Replaced div with an actual semantic text input -->
    <input type="text" class="search-input" placeholder="search...">
  </header>

  <!-- Email Verification Alert System Bar -->
  <div class="verification-banner" id="verificationBanner" style="display: none;">
    <span>⚠️ Verification link sent to your email. Click to verify your profile data.</span>
    <button class="verify-btn" id="verifyMockBtn">Verify Now</button>
  </div>

  <!-- 12-Box Grid Wireframe -->
  <main class="grid-container">
    <div class="card"></div>
    <div class="card"></div>
    <div class="card"></div>
    <div class="card"></div>
    <div class="card"></div>
    <div class="card"></div>
    <div class="card"></div>
    <div class="card"></div>
    <div class="card"></div>
    <div class="card"></div>
    <div class="card"></div>
    <div class="card"></div>
  </main> 

  <script>
    // Live Account Data Memory Object
    let accountState = {
      isLoggedIn: false,
      username: "",
      isEmailVerified: false
    };

    // Swaps interface layouts based on login statuses
    function drawAuthSystem() {
      const authBox = document.getElementById("authBox");
      const verificationBanner = document.getElementById("verificationBanner");

      if (accountState.isLoggedIn) {
        // Logged In Design
        authBox.innerHTML = `
          <span class="username-display">🎮 ${accountState.username}</span>
          <button class="signout-btn" id="signOutBtn">Sign Out</button>
        `;

        // Bind Sign Out function action
        document.getElementById("signOutBtn").addEventListener("click", () => {
          accountState.isLoggedIn = false;
          accountState.username = "";
          accountState.isEmailVerified = false;
          drawAuthSystem();
        });

        // Determine if email alert panel requires rendering
        if (!accountState.isEmailVerified) {
          verificationBanner.style.display = "flex";
        } else {
          verificationBanner.style.display = "none";
        }

      } else {
        // Logged Out Design (Inputs to sign up or join)
        authBox.innerHTML = `
          <input type="text" class="auth-input" id="usernameInput" placeholder="username">
          <input type="email" class="auth-input" id="emailInput" placeholder="email">
          <button class="auth-btn" id="loginBtn">Join / Log In</button>
        `;

        // Hide alert block when user isn't logged into anything
        verificationBanner.style.display = "none";

        // Bind Registration click action
        document.getElementById("loginBtn").addEventListener("click", () => {
          const nameValue = document.getElementById("usernameInput").value.trim();
          const emailValue = document.getElementById("emailInput").value.trim();

          if (nameValue === "" || emailValue === "") {
            alert("Please enter both fields to create your profile layout.");
            return;
          }

          accountState.isLoggedIn = true;
          accountState.username = nameValue;
          accountState.isEmailVerified = false;
          drawAuthSystem();
        });
      }
    }

    document.addEventListener("DOMContentLoaded", () => {
      // Build UI states on load
      drawAuthSystem();

      // Bind dynamic confirmation verification button action click
      document.getElementById("verifyMockBtn").addEventListener("click", () => {
        accountState.isEmailVerified = true;
        alert("Success! Your email state is verified.");
        drawAuthSystem();
      });

      // Original 12 card console framework log
      const cards = document.querySelectorAll(".card");
      cards.forEach((card, index) => {
        card.addEventListener("click", () => {
          console.log(`Box ${index + 1} clicked`);
        });
      });
    });
  </script>

</body>
</html>
