<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Wireframe Layout</title>
  
  <style>
    /* Reset and Base Styles */
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background-color: #ffffff;
      padding: 20px;
    }

    /* Header Navbar */
    .top-nav {
      width: 100%;
      height: 50px;
      border: 2px solid #000000;
      position: relative;
      margin-bottom: 25px;
    }

    /* Styled Text Box Input */
    .search-input {
      width: 30%;
      height: 25px;
      border: 1px solid #000000;
      position: absolute;
      right: 15px;
      top: 50%;
      transform: translateY(-50%);
      padding: 0 10px; /* Adds space for internal typing text */
      outline: none;  /* Removes browser default focus outlines */
      font-family: sans-serif;
    }

    /* 3-Column Content Grid */
    .grid-container {
      display: flex;
      flex-wrap: wrap;
      gap: 20px;
      width: 100%;
    }

    /* Grid Cards */
    .card {
      flex: 1 1 calc(33.333% - 14px); /* Creates 3 columns accounting for gap */
      min-width: 250px; /* Forces boxes to stack cleanly on small mobile screens */
      height: 150px;
      border: 2px solid #000000;
      cursor: pointer;
    }

    .card:hover {
      border: 3px dotted black;
    }
  </style>
</head>
<body>

  <!-- Top Navigation Wireframe -->
  <header class="top-nav">
    <!-- Replaced div with an actual semantic text input -->
    <input type="text" class="search-input" placeholder="search...">
  </header>

  <!-- 12-Box Grid Wireframe -->
  <main class="grid-container">
    <div class="card"></div>
    <div class="card"></div>
    <div class="card"></div>
    <div class="card"></div>
    <div class="card"></div>
    <div class="card"></div>
    <div class="card"></div>
    <div class="card"></div>
    <div class="card"></div>
    <div class="card"></div>
    <div class="card"></div>
    <div class="card"></div>
  </main> 

  <script>
    document.addEventListener("DOMContentLoaded", () => {
      const cards = document.querySelectorAll(".card");
      
      cards.forEach((card, index) => {
        // Optional JS interactivity hook
        card.addEventListener("click", () => {
          alert('cheese')
          
          ;
        });
      });
    });
  </script>

</body>
</html>
